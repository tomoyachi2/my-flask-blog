<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
    <h1><a href="{{ url_for('index') }}">🚀 My WordPress Blog</a></h1>
    <div>
        <a href="{{ url_for('youtube') }}" class="btn" style="background-color: #d9381e; margin-right: 5px;">🎵 YT Downloader</a>
        <a href="{{ url_for('create') }}" class="btn">＋ 新規投稿</a>
    </div>
</header>

    <div class="container" style="grid-template-columns: 1fr;">
        <main class="form-card">
            <h2 style="margin-bottom: 20px; border-bottom: 2px solid #2271b1; padding-bottom: 10px;">
                🎵 YouTube Music / Video Downloader
            </h2>

            {% with messages = get_flashed_messages(category_filter=["error"]) %}
              {% if messages %}
                <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
                  {% for message in messages %}{{ message }}{% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('youtube') }}">
                <!-- URL入力 -->
                <div class="form-group">
                    <label for="url">YouTube URL</label>
                    <input type="url" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>

                <!-- フォーマット選択 -->
                <div class="form-group">
                    <label>出力フォーマット</label>
                    <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                        <label style="font-weight: normal; cursor: pointer;">
                            <input type="radio" name="format" value="m4a" checked> 🎵 AAC (m4a) - 音声のみ・高音質
                        </label>
                        <label style="font-weight: normal; cursor: pointer;">
                            <input type="radio" name="format" value="mp3"> 🎵 MP3 - 音声のみ・互換性重視
                        </label>
                        <label style="font-weight: normal; cursor: pointer;">
                            <input type="radio" name="format" value="mp4_hd"> 🎬 MP4 (1080p) - 動画保存
                        </label>
                        <label style="font-weight: normal; cursor: pointer;">
                            <input type="radio" name="format" value="mp4_best"> 🎬 MP4 (最高画質/4K) - 動画保存
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn" style="margin-top: 15px; font-size: 1.1rem; padding: 10px 20px;">
                    ⬇️ ダウンロード開始
                </button>
            </form>
        </main>
    </div>
</body>
</html>
