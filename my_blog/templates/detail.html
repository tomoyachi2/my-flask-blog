<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="{{ url_for('index') }}">🚀 My WordPress Blog</a></h1>
        <a href="{{ url_for('index') }}" class="btn" style="background-color: #50575e;">一覧に戻る</a>
    </header>

    <div class="container">
        <main>
            <article class="post-card">
                <h2>{{ post.title }}</h2>
                <div class="post-meta">
                    📅 投稿日: {{ post.created_at.strftime('%Y年%m月%d日 %H:%M') }}
                </div>
                <hr style="border: none; border-top: 1px solid #f0f0f0; margin: 20px 0;">
                <div style="white-space: pre-wrap; line-height: 1.8; color: #2c3338;">
                    {{ post.content }}
                </div>
            </article>
        </main>

        <aside>
            <div class="widget">
                <h3>👤 プロフィール</h3>
                <p>Render ＋ Flaskで作成したWordPress風の動的ブログサイトです！</p>
            </div>
        </aside>
    </div>
</body>
</html>
