<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 - My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="{{ url_for('index') }}">🚀 My WordPress Blog</a></h1>
        <a href="{{ url_for('index') }}" class="btn" style="background-color: #50575e;">一覧に戻る</a>
    </header>

    <div class="container" style="grid-template-columns: 1fr;">
        <main class="form-card">
            <h2 style="margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">新規記事の投稿</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" id="title" name="title" placeholder="タイトルを入力..." required>
                </div>
                <div class="form-group">
                    <label for="content">本文</label>
                    <textarea id="content" name="content" rows="12" placeholder="文章を入力..." required></textarea>
                </div>
                <button type="submit" class="btn">公開する</button>
            </form>
        </main>
    </div>
</body>
</html>
